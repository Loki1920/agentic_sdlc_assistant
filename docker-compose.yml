version: "3.9"

# Shared environment block — injected into every service
x-common-env: &common-env
  env_file:
    - .env
  environment:
    SQLITE_DB_PATH: /app/data/sdlc_assistant.db
    ACTIVITY_LOG_PATH: /app/logs/activity.jsonl
    LLM_LOG_PATH: /app/logs/llm_calls.jsonl
    PYTHONUNBUFFERED: "1"
    PYTHONIOENCODING: "utf-8"

services:

  # ──────────────────────────────────────────────────────────────
  # Scheduler: polls Jira every N seconds, runs the full agent
  # pipeline for each "Ready for Dev" ticket found.
  # ──────────────────────────────────────────────────────────────
  sdlc_assistant:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sdlc_assistant
    restart: unless-stopped
    <<: *common-env
    volumes:
      - sdlc_data:/app/data
      - sdlc_logs:/app/logs
      # Mount AWS credentials read-only (needed only when LLM_PROVIDER=bedrock)
      - ${HOME}/.aws:/root/.aws:ro
    networks:
      - sdlc_net
    depends_on:
      sdlc_metrics:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "from scheduler.poller import is_scheduler_running; assert is_scheduler_running()"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s

  # ──────────────────────────────────────────────────────────────
  # Metrics API: FastAPI server on port 8080
  #   GET  /health            — liveness check
  #   GET  /metrics           — JSON KPI report
  #   GET  /docs              — Swagger UI
  #   POST /pr/{run_id}/approve  — mark PR approved (requires X-Api-Key)
  #   POST /pr/{run_id}/reject   — mark PR rejected (requires X-Api-Key)
  # ──────────────────────────────────────────────────────────────
  sdlc_metrics:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sdlc_metrics
    command: ["python", "main.py", "--mode", "metrics-server"]
    restart: unless-stopped
    <<: *common-env
    environment:
      SQLITE_DB_PATH: /app/data/sdlc_assistant.db
      METRICS_PORT: "8080"
    ports:
      - "8080:8080"
    volumes:
      - sdlc_data:/app/data
      - sdlc_logs:/app/logs:ro
    networks:
      - sdlc_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ──────────────────────────────────────────────────────────────
  # Dashboard: Streamlit UI on port 8501
  #   http://localhost:8501  — KPI cards, workflow runs, LLM call log,
  #                            PR approve/reject actions
  # ──────────────────────────────────────────────────────────────
  sdlc_dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sdlc_dashboard
    command: ["streamlit", "run", "dashboard.py",
              "--server.port", "8501",
              "--server.address", "0.0.0.0",
              "--server.headless", "true",
              "--browser.gatherUsageStats", "false"]
    restart: unless-stopped
    <<: *common-env
    environment:
      SQLITE_DB_PATH: /app/data/sdlc_assistant.db
      METRICS_API_URL: http://sdlc_metrics:8080
    ports:
      - "8501:8501"
    volumes:
      - sdlc_data:/app/data
      - sdlc_logs:/app/logs:ro
    networks:
      - sdlc_net
    depends_on:
      sdlc_metrics:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  sdlc_data:
    driver: local
  sdlc_logs:
    driver: local

networks:
  sdlc_net:
    driver: bridge
